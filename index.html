<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curtain ERP PRO - HE/TR/EN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&display=swap');
        body { font-family: 'Assistant', sans-serif; }
        @media print { .no-print { display: none !important; } .print-area { display: block !important; width: 100%; } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script>
        const { useState, useEffect } = React;
        const API_URL = "https://script.google.com/macros/s/AKfycbxzXWMmyss0QJpQ8JQKsA8x_yO2J2btNrTG-8WeFG8g3btsW03EaKfOhDvrL1dWUa8D/exec";

        const i18n = {
            he: { dir: "rtl", welcome: "ברוכים הבאים", login: "כניסה", admin: "ניהול", producer: "ייצור", customer: "הזמנה", series: "סדרת בד", width: "רוחב", height: "גובה", total: "סה\"כ לפני מע\"מ", final: "כולל מע\"מ", status: "סטטוס", save: "שמור הזמנה", tube: "צינור", motor: "מנוע", cassette: "קסטה", approve: "אשר", users: "משתמשים", fabrics: "בדים" },
            tr: { dir: "ltr", welcome: "Hoş Geldiniz", login: "Giriş", admin: "Yönetici", producer: "Üretim", customer: "Sipariş", series: "Kumaş Serisi", width: "Genişlik", height: "Yükseklik", total: "KDV Hariç", final: "KDV Dahil", status: "Durum", save: "Kaydet", tube: "Boru", motor: "Motor", cassette: "Kaset", approve: "Onayla", users: "Kullanıcılar", fabrics: "Kumaşlar" },
            en: { dir: "ltr", welcome: "Welcome", login: "Login", admin: "Admin", producer: "Production", customer: "Order", series: "Fabric Series", width: "Width", height: "Height", total: "Total Excl. VAT", final: "Incl. VAT", status: "Status", save: "Save Order", tube: "Tube", motor: "Motor", cassette: "Cassette", approve: "Approve", users: "Users", fabrics: "Fabrics" }
        };

        const App = () => {
            const [lang, setLang] = useState('he');
            const [user, setUser] = useState(null);
            const [view, setView] = useState('login');
            const [data, setData] = useState({ series: [], orders: [], users: [] });
            const [cart, setCart] = useState([]);
            const [loading, setLoading] = useState(false);
            const t = i18n[lang];

            useEffect(() => { document.documentElement.dir = t.dir; }, [lang]);

            const fetchAll = async () => {
                const res = await fetch(`${API_URL}?action=getAppData`);
                setData(await res.json());
            };

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'login', email: e.target.email.value, password: e.target.pass.value }) });
                const resData = await res.json();
                if (resData.success) {
                    setUser(resData.user);
                    await fetchAll();
                    if (resData.user.Role === 'Manager') setView('admin');
                    else if (resData.user.Role === 'Producer') setView('producer');
                    else setView('customer');
                } else alert("Error Login");
                setLoading(false);
            };

            // --- מחשבון מחיר (לפי דרישות הצינור החשמלי החדשות) ---
            const calcItem = (it) => {
                const s = data.series.find(x => x.SeriesName === it.series);
                if(!s) return 0;
                let p = Math.max(it.w, 100)/100 * Math.max(it.h, 150)/100 * s.PriceSQM;
                const wM = it.w / 100;
                const isE = it.motor !== 'manual';
                
                // לוגיקת צינורות
                if (!isE) {
                    if (it.w >= 191 && it.w <= 230) p += wM * 25;
                    else if (it.w >= 231 && it.w <= 300) p += wM * 50;
                    else if (it.w > 300) p += wM * 55;
                } else {
                    p += (it.w <= 300) ? wM * 65 : wM * 120;
                }
                
                if (it.cassette) p += wM * 40;
                
                // מנועים (דויה/סומפי)
                if (isE) {
                    const motorBase = (it.motor === 'somfy') ? (it.w > 300 ? 1250 : 1150) : (it.w > 300 ? 800 : 700);
                    p += motorBase;
                }
                return Math.round(p);
            };

            // --- ממשק מנהל ---
            const AdminUI = () => (
                <div className="p-4 space-y-6">
                    <section className="bg-white p-6 rounded-2xl shadow-sm">
                        <h2 className="text-xl font-bold mb-4">{t.users} (ממתינים לאישור)</h2>
                        <div className="space-y-2">
                            {data.users.filter(u => u.Status === 'Pending').map(u => (
                                <div key={u.Email} className="flex justify-between items-center bg-slate-50 p-3 rounded-xl">
                                    <span>{u.FullName} ({u.Email})</span>
                                    <button className="bg-green-600 text-white px-4 py-1 rounded-lg" onClick={async ()=>{
                                        await fetch(API_URL, {method:'POST', body: JSON.stringify({action:'updateUserStatus', email: u.Email, status: 'Approved'})});
                                        fetchAll();
                                    }}>{t.approve}</button>
                                </div>
                            ))}
                        </div>
                    </section>
                    <section className="bg-white p-6 rounded-2xl shadow-sm">
                        <h2 className="text-xl font-bold mb-4">ניהול בדים (Series)</h2>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            {data.series.map(s => (
                                <div key={s.Code} className="border p-4 rounded-xl flex justify-between">
                                    <div><p className="font-bold">{s.SeriesName}</p><p className="text-sm text-gray-500">{s.PriceSQM} ₪/m²</p></div>
                                    <button className="text-blue-600">ערוך</button>
                                </div>
                            ))}
                        </div>
                    </section>
                </div>
            );

            // --- ממשק יצרן ---
            const ProducerUI = () => {
                const [sel, setSel] = useState(null);
                return (
                    <div className="p-4">
                        {!sel ? (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                {data.orders.map(o => (
                                    <div key={o.OrderID} className="bg-white p-5 rounded-2xl shadow-sm border-r-4 border-blue-600">
                                        <div className="flex justify-between mb-3"><span className="font-bold">{o.OrderID}</span><span className="text-xs bg-blue-100 text-blue-700 px-2 py-1 rounded">{o.Status}</span></div>
                                        <p className="text-sm text-gray-500 mb-4">{o.CustomerEmail}</p>
                                        <button onClick={()=>setSel(o)} className="w-full bg-slate-900 text-white py-2 rounded-xl font-bold uppercase">{t.print}</button>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="bg-white p-8 rounded-3xl shadow-xl max-w-4xl mx-auto print-area">
                                <div className="flex justify-between items-center border-b-2 pb-4 mb-6">
                                    <h1 className="text-3xl font-black">FABRIC ORDER: {sel.OrderID}</h1>
                                    <div className="no-print space-x-2">
                                        <button onClick={()=>window.print()} className="bg-blue-600 text-white px-6 py-2 rounded-xl">Print</button>
                                        <button onClick={()=>setSel(null)} className="bg-gray-200 px-4 py-2 rounded-xl">X</button>
                                    </div>
                                </div>
                                <table className="w-full text-center text-lg border-collapse">
                                    <thead><tr className="bg-slate-100"><th className="border p-3">Description</th><th className="border p-3">Width x Height</th><th className="border p-3">Technical</th></tr></thead>
                                    <tbody>
                                        {JSON.parse(sel.ItemsJSON).map((it, i) => (
                                            <tr key={i} className="border-b">
                                                <td className="p-3 font-bold">{it.series} - {it.color}</td>
                                                <td className="p-3 text-2xl font-black">{it.w} x {it.h}</td>
                                                <td className="p-3 text-red-600 font-bold">{it.tube} <br/> <span className="text-black text-xs">{it.motor}</span></td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </div>
                );
            };

            if (view === 'login') return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-slate-900">
                    <div className="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md">
                        <div className="flex justify-center gap-2 mb-8">
                            <button onClick={()=>setLang('he')} className={`px-3 py-1 rounded-full text-xs ${lang==='he'?'bg-black text-white':'bg-gray-100'}`}>HE</button>
                            <button onClick={()=>setLang('tr')} className={`px-3 py-1 rounded-full text-xs ${lang==='tr'?'bg-black text-white':'bg-gray-100'}`}>TR</button>
                            <button onClick={()=>setLang('en')} className={`px-3 py-1 rounded-full text-xs ${lang==='en'?'bg-black text-white':'bg-gray-100'}`}>EN</button>
                        </div>
                        <h1 className="text-4xl font-black text-center mb-8 text-slate-800 tracking-tight">{t.welcome}</h1>
                        <form onSubmit={handleLogin} className="space-y-4">
                            <input name="email" type="email" placeholder={t.email} className="w-full bg-slate-50 border-none p-4 rounded-2xl focus:ring-2 focus:ring-blue-500" required />
                            <input name="pass" type="password" placeholder={t.password} className="w-full bg-slate-50 border-none p-4 rounded-2xl focus:ring-2 focus:ring-blue-500" required />
                            <button className="w-full bg-blue-600 text-white p-5 rounded-2xl font-bold text-lg hover:scale-[1.02] transition-transform shadow-lg shadow-blue-200" disabled={loading}>
                                {loading ? '...' : t.login}
                            </button>
                        </form>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen pb-20">
                    <nav className="bg-white border-b p-4 flex justify-between items-center sticky top-0 z-50 no-print">
                        <span className="font-extrabold text-xl text-blue-600 italic">ExpertBlinds.</span>
                        <div className="flex gap-4 items-center">
                            {user.Role === 'Manager' && <button onClick={()=>setView('admin')} className={view==='admin'?'font-bold':''}>{t.admin}</button>}
                            {user.Role === 'Producer' && <button onClick={()=>setView('producer')} className={view==='producer'?'font-bold':''}>{t.producer}</button>}
                            <button onClick={()=>setView('customer')} className={view==='customer'?'font-bold':''}>{t.customer}</button>
                            <button onClick={()=>window.location.reload()} className="text-red-500 text-sm">Logout</button>
                        </div>
                    </nav>

                    {view === 'admin' && <AdminUI />}
                    {view === 'producer' && <ProducerUI />}
                    {view === 'customer' && (
                        <div className="max-w-2xl mx-auto p-4 space-y-6">
                            <div className="bg-white p-8 rounded-[2rem] shadow-sm space-y-4">
                                <h2 className="text-2xl font-bold mb-4">{t.customer}</h2>
                                <select id="s" className="w-full bg-slate-50 border-none p-4 rounded-2xl">
                                    {data.series.map(s => <option key={s.Code} value={s.SeriesName}>{s.SeriesName} ({s.PriceSQM}₪)</option>)}
                                </select>
                                <div className="grid grid-cols-2 gap-4">
                                    <input id="w" type="number" placeholder={t.width} className="bg-slate-50 border-none p-4 rounded-2xl" />
                                    <input id="h" type="number" placeholder={t.height} className="bg-slate-50 border-none p-4 rounded-2xl" />
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <select id="m" className="bg-slate-50 border-none p-4 rounded-2xl">
                                        <option value="manual">{t.manual}</option>
                                        <option value="somfy">Somfy</option>
                                        <option value="doya">Doya</option>
                                    </select>
                                    <label className="flex items-center gap-2 bg-slate-50 p-4 rounded-2xl cursor-pointer">
                                        <input id="cass" type="checkbox" className="w-5 h-5" /> {t.cassette}
                                    </label>
                                </div>
                                <button onClick={()=>{
                                    const it = { series: document.getElementById('s').value, w: document.getElementById('w').value, h: document.getElementById('h').value, motor: document.getElementById('m').value, cassette: document.getElementById('cass').checked, color: 'N/A' };
                                    const {price, tube} = {price: calcItem(it), tube: it.w > 230 ? '50mm' : '38mm'};
                                    setCart([...cart, {...it, price, tube}]);
                                }} className="w-full bg-slate-900 text-white p-5 rounded-2xl font-bold">+ {t.save}</button>
                            </div>

                            {cart.length > 0 && (
                                <div className="bg-white p-8 rounded-[2rem] shadow-xl border-t-8 border-blue-600">
                                    <div className="space-y-4 mb-6">
                                        {cart.map((it, i) => (
                                            <div key={i} className="flex justify-between border-b pb-2">
                                                <span>{it.series} ({it.w}x{it.h})</span>
                                                <span className="font-bold">₪{it.price}</span>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="text-right space-y-1">
                                        <p>{t.total}: ₪{cart.reduce((s,i)=>s+i.price,0)}</p>
                                        <p className="text-2xl font-black">{t.final}: ₪{Math.round(cart.reduce((s,i)=>s+i.price,0)*1.17)}</p>
                                    </div>
                                    <button onClick={async ()=>{
                                        setLoading(true);
                                        await fetch(API_URL, {method:'POST', body: JSON.stringify({action:'saveOrder', email: user.Email, items: cart, totalExclVat: cart.reduce((s,i)=>s+i.price,0)})});
                                        alert("Done!"); setCart([]); fetchAll(); setLoading(false);
                                    }} className="w-full bg-green-600 text-white p-5 rounded-2xl font-black mt-6 shadow-lg shadow-green-100">SUBMIT ORDER</button>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
