<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curtain ERP - Decorit</title>
    
    <!-- ספריות חיצוניות - טעינה מאובטחת -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&display=swap');
        body { font-family: 'Assistant', sans-serif; margin: 0; padding: 0; }
        .loading-screen { display: flex; justify-content: center; align-items: center; height: 100vh; font-size: 24px; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root">
        <div class="loading-screen">טוען מערכת... אנא המתן</div>
    </div>

    <!-- שימוש ב-Babel לתרגום JSX -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        const API_URL = "https://script.google.com/macros/s/AKfycbxzXWMmyss0QJpQ8JQKsA8x_yO2J2btNrTG-8WeFG8g3btsW03EaKfOhDvrL1dWUa8D/exec";

        const i18n = {
            he: { dir: "rtl", login: "כניסה", customer: "הזמנה", producer: "ייצור", admin: "ניהול", width: "רוחב", height: "גובה", series: "סדרה", total: "סה\"כ", save: "שלח לייצור", vat: "מע\"מ", final: "סופי" },
            tr: { dir: "ltr", login: "Giriş", customer: "Sipariş", producer: "Üretim", admin: "Yönetici", width: "Genişlik", height: "Yükseklik", series: "Seri", total: "Toplam", save: "Kaydet", vat: "KDV", final: "Son" },
            en: { dir: "ltr", login: "Login", customer: "Order", producer: "Production", admin: "Admin", width: "Width", height: "Height", series: "Series", total: "Total", save: "Save", vat: "VAT", final: "Final" }
        };

        const App = () => {
            const [lang, setLang] = useState('he');
            const [view, setView] = useState('login');
            const [data, setData] = useState({ series: [], orders: [], users: [] });
            const [cart, setCart] = useState([]);
            const [user, setUser] = useState(null);
            const t = i18n[lang];

            useEffect(() => {
                document.documentElement.dir = t.dir;
                fetchAll();
            }, [lang]);

            const fetchAll = async () => {
                try {
                    const res = await fetch(`${API_URL}?action=getAppData`);
                    const json = await res.json();
                    setData(json);
                } catch (e) { console.error("Data fetch error", e); }
            };

            const handleLogin = (e) => {
                e.preventDefault();
                // לצורך בדיקה עוקפים את השרת אם הוא איטי
                setUser({ FullName: "מנהל", Role: "Manager" });
                setView('customer');
            };

            const calcPrice = (it) => {
                const s = data.series.find(x => x.SeriesName === it.series) || {PriceSQM: 75};
                let p = (Math.max(it.w, 100)/100) * (Math.max(it.h, 150)/100) * s.PriceSQM;
                if (it.w > 200) p += 50; 
                return Math.round(p);
            };

            if (view === 'login') return (
                <div className="min-h-screen flex items-center justify-center bg-slate-900 p-4">
                    <div className="bg-white p-10 rounded-[2rem] shadow-2xl w-full max-w-md text-center">
                        <h1 className="text-3xl font-black mb-6">Decorit ERP</h1>
                        <form onSubmit={handleLogin} className="space-y-4">
                            <input type="email" placeholder="אימייל" className="w-full border p-4 rounded-xl" required />
                            <input type="password" placeholder="סיסמה" className="w-full border p-4 rounded-xl" required />
                            <button className="w-full bg-blue-600 text-white p-4 rounded-xl font-bold">התחברות</button>
                        </form>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen">
                    <nav className="bg-white border-b p-4 flex justify-between items-center no-print">
                        <span className="font-bold text-xl text-blue-600">Decorit</span>
                        <div className="flex gap-4">
                            <button onClick={() => setView('customer')}>{t.customer}</button>
                            <button onClick={() => setView('producer')}>{t.producer}</button>
                            <button onClick={() => window.location.reload()}>יציאה</button>
                        </div>
                    </nav>

                    <div className="p-6 max-w-4xl mx-auto">
                        {view === 'customer' && (
                            <div className="bg-white p-8 rounded-2xl shadow">
                                <h2 className="text-2xl font-bold mb-4">הזמנה חדשה</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <select id="s" className="border p-3 rounded-xl">
                                        <option value="">בחר סדרה</option>
                                        {data.series.map(s => <option key={s.Code} value={s.SeriesName}>{s.SeriesName}</option>)}
                                    </select>
                                    <input id="w" type="number" placeholder="רוחב" className="border p-3 rounded-xl" />
                                    <input id="h" type="number" placeholder="גובה" className="border p-3 rounded-xl" />
                                    <button onClick={() => {
                                        const it = { series: document.getElementById('s').value, w: document.getElementById('w').value, h: document.getElementById('h').value };
                                        it.price = calcPrice(it);
                                        setCart([...cart, it]);
                                    }} className="bg-blue-600 text-white p-3 rounded-xl font-bold">הוסף לסל</button>
                                </div>
                                {cart.length > 0 && (
                                    <div className="mt-6 border-t pt-4">
                                        {cart.map((it, i) => <div key={i} className="flex justify-between py-1 border-b"><span>{it.series}</span><span>₪{it.price}</span></div>)}
                                        <div className="text-xl font-bold mt-2">סה"כ: ₪{cart.reduce((s,i)=>s+i.price,0)}</div>
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'producer' && (
                            <div className="bg-white p-8 rounded-2xl shadow text-center">
                                <h2 className="text-xl font-bold">ממשק יצרן</h2>
                                <p className="mt-4 text-gray-500">הזמנות יופיעו כאן לאחר סנכרון</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // אתחול האפליקציה
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
