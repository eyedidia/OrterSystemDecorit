<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curtain ERP - Decorit</title>
    
    <!-- ספריות חובה -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel - הופך את הקוד לקריא לדפדפן -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&display=swap');
        body { font-family: 'Assistant', sans-serif; }
        @media print { .no-print { display: none !important; } .print-area { display: block !important; } }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <!-- שים לב לסוג הסקריפט: text/babel -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        // הקישור שלך ל-Google Apps Script
        const API_URL = "https://script.google.com/macros/s/AKfycbxzXWMmyss0QJpQ8JQKsA8x_yO2J2btNrTG-8WeFG8g3btsW03EaKfOhDvrL1dWUa8D/exec";

        const i18n = {
            he: { dir: "rtl", welcome: "ברוכים הבאים", login: "כניסה", admin: "ניהול", producer: "ייצור", customer: "הזמנה", series: "סדרת בד", width: "רוחב", height: "גובה", total: "סה\"כ לפני מע\"מ", final: "כולל מע\"מ", status: "סטטוס", save: "שמור הזמנה", tube: "צינור", motor: "מנוע", cassette: "קסטה", approve: "אשר", users: "משתמשים", fabrics: "בדים", print: "הדפסה" },
            tr: { dir: "ltr", welcome: "Hoş Geldiniz", login: "Giriş", admin: "Yönetici", producer: "Üretim", customer: "Sipariş", series: "Kumaş Serisi", width: "Genişlik", height: "Yükseklik", total: "KDV Hariç", final: "KDV Dahil", status: "Durum", save: "Kaydet", tube: "Boru", motor: "Motor", cassette: "Kaset", approve: "Onayla", users: "Kullanıcılar", fabrics: "Kumaşlar", print: "Yazdır" },
            en: { dir: "ltr", welcome: "Welcome", login: "Login", admin: "Admin", producer: "Production", customer: "Order", series: "Fabric Series", width: "Width", height: "Height", total: "Total Excl. VAT", final: "Incl. VAT", status: "Status", save: "Save Order", tube: "Tube", motor: "Motor", cassette: "Cassette", approve: "Approve", users: "Users", fabrics: "Fabrics", print: "Print" }
        };

        const App = () => {
            const [lang, setLang] = useState('he');
            const [user, setUser] = useState(null);
            const [view, setView] = useState('login');
            const [data, setData] = useState({ series: [], orders: [], users: [] });
            const [cart, setCart] = useState([]);
            const [loading, setLoading] = useState(false);
            const t = i18n[lang];

            useEffect(() => {
                document.documentElement.dir = t.dir;
            }, [lang]);

            const fetchAll = async () => {
                try {
                    const res = await fetch(`${API_URL}?action=getAppData`);
                    const json = await res.json();
                    setData(json);
                } catch (e) { console.error("Error fetching data", e); }
            };

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    const res = await fetch(API_URL, {
                        method: 'POST',
                        mode: 'no-cors', // פותר בעיות CORS לפעמים בבדיקות
                        body: JSON.stringify({ action: 'login', email: e.target.email.value, password: e.target.pass.value })
                    });
                    // הערה: בגלל no-cors לא ניתן לקרוא את התגובה במדויק, 
                    // לכן לצורך בדיקה ראשונית ניתן להוסיף כאן לוגיקה זמנית:
                    setUser({FullName: "משתמש בדיקה", Role: "Manager", Email: e.target.email.value});
                    await fetchAll();
                    setView('customer');
                } catch (e) { alert("שגיאת התחברות"); }
                setLoading(false);
            };

            const calcItem = (it) => {
                const s = data.series.find(x => x.SeriesName === it.series) || {PriceSQM: 75};
                let p = (Math.max(it.w, 100)/100) * (Math.max(it.h, 150)/100) * s.PriceSQM;
                if (it.motor !== 'manual') p += (it.w > 300 ? 1250 : 1150);
                if (it.cassette) p += (it.w / 100) * 40;
                return Math.round(p);
            };

            if (view === 'login') return (
                <div className="min-h-screen flex items-center justify-center p-6 bg-slate-900">
                    <div className="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md">
                        <h1 className="text-4xl font-black text-center mb-8 text-slate-800 tracking-tight">Decorit ERP</h1>
                        <form onSubmit={handleLogin} className="space-y-4">
                            <input name="email" type="email" placeholder={t.email} className="w-full bg-slate-50 border p-4 rounded-2xl" required />
                            <input name="pass" type="password" placeholder={t.password} className="w-full bg-slate-50 border p-4 rounded-2xl" required />
                            <button className="w-full bg-blue-600 text-white p-5 rounded-2xl font-bold text-lg hover:bg-blue-700">
                                {loading ? '...' : t.login}
                            </button>
                        </form>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen">
                    <nav className="bg-white border-b p-4 flex justify-between items-center no-print">
                        <span className="font-extrabold text-xl text-blue-600 italic">Decorit.</span>
                        <div className="flex gap-4 items-center">
                            <button onClick={()=>setView('customer')}>{t.customer}</button>
                            <button onClick={()=>setView('producer')}>{t.producer}</button>
                            <button onClick={()=>window.location.reload()} className="text-red-500 text-sm">יציאה</button>
                        </div>
                    </nav>

                    <div className="p-4 max-w-4xl mx-auto">
                        {view === 'customer' && (
                            <div className="space-y-6">
                                <div className="bg-white p-8 rounded-[2rem] shadow-sm space-y-4">
                                    <h2 className="text-2xl font-bold mb-4">{t.customer}</h2>
                                    <select id="s" className="w-full bg-slate-50 border p-4 rounded-2xl">
                                        <option value="">בחר סדרה...</option>
                                        {data.series.map(s => <option key={s.Code} value={s.SeriesName}>{s.SeriesName}</option>)}
                                    </select>
                                    <div className="grid grid-cols-2 gap-4">
                                        <input id="w" type="number" placeholder={t.width} className="bg-slate-50 border p-4 rounded-2xl" />
                                        <input id="h" type="number" placeholder={t.height} className="bg-slate-50 border p-4 rounded-2xl" />
                                    </div>
                                    <button onClick={()=>{
                                        const it = { 
                                            series: document.getElementById('s').value, 
                                            w: document.getElementById('w').value, 
                                            h: document.getElementById('h').value,
                                            motor: 'manual', 
                                            cassette: false 
                                        };
                                        it.price = calcItem(it);
                                        setCart([...cart, it]);
                                    }} className="w-full bg-slate-900 text-white p-5 rounded-2xl font-bold">+ הוסף לסל</button>
                                </div>

                                {cart.length > 0 && (
                                    <div className="bg-white p-8 rounded-[2rem] shadow-xl border-t-8 border-blue-600">
                                        {cart.map((it, i) => (
                                            <div key={i} className="flex justify-between border-b py-2">
                                                <span>{it.series} ({it.w}x{it.h})</span>
                                                <span className="font-bold">₪{it.price}</span>
                                            </div>
                                        ))}
                                        <div className="text-2xl font-black mt-4 text-left">
                                            סה"כ: ₪{cart.reduce((s,i)=>s+i.price, 0)}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'producer' && (
                            <div className="bg-white p-8 rounded-2xl shadow">
                                <h2 className="text-xl font-bold mb-4">הזמנות בייצור</h2>
                                <p className="text-gray-500 text-center py-10">אין הזמנות חדשות כרגע</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
